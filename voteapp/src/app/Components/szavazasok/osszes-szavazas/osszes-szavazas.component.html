<h1 class="text-2xl p-4">Szavazások</h1>
<div class="flex sm:flex-col flex-wrap">
  <div class="flex flex-col sm:flex-row justify-center flex-wrap">
    <div
      *ngFor="let item of allSzavazasok"
      class="lg:w-1/4 border-black border-1 p-4"
    >
      <h1>{{ item.title }}</h1>
      <h1>Létrehozva: {{ item.created_at | date }}</h1>
      <div class="flex flex-wrap p-2 gap-2">
        <button
          (click)="megnyitas(item.id)"
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded"
        >
          Megnyitás
        </button>
        <button
          class="bg-yellow-500 hover:bg-yellow-700 text-white font-bold py-2 px-4 rounded"
          (click)="eredmenyek(item.id)"
        >
          Eredmények
        </button>
        <button
          class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
          (click)="szavazasTorlese(item.id)"
        >
          Törlés
        </button>
      </div>
    </div>
  </div>
</div>
